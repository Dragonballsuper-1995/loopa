  <!-- Typographic Wordmark -->
  <text x="52" y="32" fill="white" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="22" font-weight="bold" letter-spacing="1">TSUGI<tspan fill="#FF4500">.</tspan></text>
