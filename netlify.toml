[build]
  base = "website"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; connect-src 'self' https://utkqrfdheofuepeuzutg.supabase.co https://loopa-tmdb-proxy.sujalsanjay-chhajed2023.workers.dev https://loopa-ai-proxy.sujalsanjay-chhajed2023.workers.dev;"

